<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reviews</title>
  <style>
    :root {
      --bg: #f7f3ea;
      --panel: #ffffff;
      --accent: #6f4e37;
      --text: #2f241d;
      --muted: #6f655c;
      --border: #e8dccf;
    }

    body.dark {
      --bg: #1c1816;
      --panel: #2a2421;
      --accent: #f1c28b;
      --text: #f6efe8;
      --muted: #d4c6b6;
      --border: #4b4037;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .container { max-width: 1000px; margin: 0 auto; padding: 24px; }
    header {
      display: flex; justify-content: space-between; align-items: center; gap: 16px;
      padding: 20px 24px; background: var(--panel); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px;
    }
    nav { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    nav a { text-decoration: none; color: var(--accent); font-weight: 600; }
    .theme-toggle {
      border: 1px solid var(--border); background: var(--panel); color: var(--text);
      padding: 8px 12px; border-radius: 999px; font-weight: 700; cursor: pointer;
    }
    .cards { display: grid; gap: 16px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
    .card h3 { margin-top: 0; }
    .card p { color: var(--muted); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Reviews</h1>
        <p>What readers are saying about these books.</p>
      </div>
      <nav>
        <a href="index.html">Home</a>
        <a href="cart.html">Cart</a>
        <button id="theme-toggle" class="theme-toggle" type="button">🌙 Dark</button>
      </nav>
    </header>

    <section class="cards">
      <div class="card"><h3>The Midnight Library</h3><p>“Poignant, hopeful, and beautifully written.” — Maya</p></div>
      <div class="card"><h3>Atomic Habits</h3><p>“Simple, practical, and genuinely life-changing.” — Daniel</p></div>
      <div class="card"><h3>1984</h3><p>“A powerful classic that still feels urgent today.” — Sara</p></div>
    </section>
  </div>

  <script src="cart.js"></script>
  <script>
    initializeTheme();
  </script>
</body>
</html>
